name: fred_housing
type: api
url: https://api.stlouisfed.org/fred/series/observations

foreach:
  source: census_states
  field: abbr
  inject_param: series_id
  inject_template: "{abbr}STHPI"
  inject_fields: [abbr, fips]

params:
  api_key: a33d718b48462edc6d9ac57bacc49037
  file_type: json
  observation_start: "1975-01-01"
response_format: json
response_path: observations
cache: true
drop_na: true

fields:
  - source: date
    alias: date
  - source: value
    alias: value
    cast: float
  - source: abbr
    alias: abbr
  - source: fips
    alias: fips
