name: fred_nj_housing
type: api
url: https://api.stlouisfed.org/fred/series/observations
params:
  series_id: NJSTHPI
  api_key: ${FRED_API_KEY}
  file_type: json
  observation_start: "2010-01-01"
response_format: json
response_path: observations
cache: true
drop_na: true
fields:
  - source: date
    alias: date
  - source: value
    alias: value
    cast: float
