[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rail-mcp"
version = "1.1.0"
description = "MCP server exposing the KRAIL local knowledge runtime to AI agents"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "AkeBoss Tech" },
]
keywords = [
    "krail",
    "mcp",
    "agents",
    "local-first",
    "knowledge",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "mcp>=1.0",
    "httpx>=0.27",
    "krail>=1.1.0,<2.0.0",
]

[project.urls]
Homepage = "https://github.com/AkeBoss-tech/knowledge"
Documentation = "https://github.com/AkeBoss-tech/knowledge/tree/main/docs"
Repository = "https://github.com/AkeBoss-tech/knowledge"
Issues = "https://github.com/AkeBoss-tech/knowledge/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["rail_mcp*"]

[project.scripts]
rail-mcp = "rail_mcp.server:main"
