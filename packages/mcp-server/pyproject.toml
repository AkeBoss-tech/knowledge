[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rail-mcp"
version = "0.2.0"
description = "MCP server exposing the RAIL platform to AI agents"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "httpx>=0.27",
    "rail",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["rail_mcp*"]

[project.scripts]
rail-mcp = "rail_mcp.server:main"
