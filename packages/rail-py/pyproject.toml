[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "krail"
version = "0.2.4"
description = "Local-first memory and workflows for serious AI agent projects"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "AkeBoss Tech" },
]
keywords = [
    "knowledge",
    "agents",
    "local-first",
    "mcp",
    "research",
    "workflows",
    "rag",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2",
    "pyyaml>=6",
]

[project.urls]
Homepage = "https://github.com/AkeBoss-tech/knowledge"
Documentation = "https://github.com/AkeBoss-tech/knowledge/tree/main/docs"
Repository = "https://github.com/AkeBoss-tech/knowledge"
Issues = "https://github.com/AkeBoss-tech/knowledge/issues"

[project.optional-dependencies]
analysis = ["numpy", "pandas", "statsmodels", "matplotlib"]
local = ["owlready2", "duckdb"]
embeddings = ["sentence-transformers>=2.7"]

[tool.setuptools.packages.find]
where = ["."]
include = ["rail*"]

[project.scripts]
rail = "rail.cli:main"
krail = "rail.cli:main"
