# Runner Profile: Jules (Google Jules hosted API)
#
# Most mature runner. Real session lifecycle through a hosted API: create,
# message, approve, cancel. GitHub-backed source, so works with any repo
# Jules has access to. No MCP integration today — Jules has its own tool
# system. Capabilities reflect what Jules can do via that system, not via
# MCP.
name: jules
adapter: hosted_api
default_command: null
status: certified

execution:
  mode: hosted_api
  supports_streaming: "yes"
  supports_resume: configurable
  supports_midrun_messages: true
  supports_native_approval: true
  supports_cancel: true
  supports_mcp: "no"
  supports_native_questions: "no"  # could be added via Jules's own tool channel
  steering_mode: native

capabilities:
  edit_files: "yes"
  run_shell: "yes"
  fetch_remote_data: "yes"
  query_duckdb: "configurable"  # via run_shell + rail CLI
  execute_python: "yes"
  use_mcp_tools: "no"
  browse_web: "configurable"
  extract_pdf_tables: "unknown"
  write_long_artifacts: "yes"
  handle_large_context: "yes"
  write_structured_output: "yes"

task_affinity:
  data_ingestion: 0.7
  analysis: 0.65
  source_discovery: 0.55
  artifact_writing: 0.65
  health_repair: 0.75
  claim_extraction: 0.6
  verification: 0.75

notes: |
  Requires JULES_API_KEY and a GitHub-accessible repo. No MCP today — if
  RAIL Q&A and tool-call channels need parity with claude_code/codex_cli,
  consider wrapping rail.ask via the Jules send_message API as a bridge.
