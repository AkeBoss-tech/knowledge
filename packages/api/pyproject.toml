[project]
name = "rail-api"
version = "0.1.0"
description = "FastAPI service wrapping the RAIL ontology engine"
requires-python = ">=3.11"

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "pyyaml>=6.0.1",
    "owlready2>=0.46",
    "pandas>=2.2.0",
    "requests>=2.32.0",
    "openpyxl>=3.1.0",
]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]
