uri: http://example.org/rutgers_ontology.owl

classes:
  - name: State
  - name: County
  - name: Municipality
  - name: Individual
  - name: Measure

object_properties:
  - name: isPartOf
    domain: [County, Municipality]
    range: [State, County]
    inverse: hasPart
  - name: locatedIn
    domain: [Individual, Municipality, County]
    range: [Municipality, County, State]
  - name: measuredFor
    domain: [Measure]
    range: [State, County, Municipality]

data_properties:
  - name: hasName
    domain: [Thing]
    range: str
    functional: true
  - name: hasPopulation
    domain: [State, County, Municipality]
    range: int
    functional: true
  - name: hasFIPS
    domain: [State, County, Municipality]
    range: str
    functional: true
  - name: hasIncome
    domain: [Individual]
    range: float
    functional: true
  - name: hasValue
    domain: [Measure]
    range: float
    functional: true
  - name: hasDate
    domain: [Measure]
    range: str
    functional: true
  - name: hasSeries
    domain: [Measure]
    range: str
    functional: true
  - name: hasUnit
    domain: [Measure]
    range: str
    functional: true
