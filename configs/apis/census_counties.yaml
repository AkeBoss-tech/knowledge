name: census_counties
type: api
url: https://api.census.gov/data/2020/dec/pl
response_format: census_array
cache: true

# Loop over rows from census_states, filtered to NJ and NY only
foreach:
  source: census_states
  field: fips
  filter: "fips in ['34', '36']"
  inject_param: "in"
  inject_template: "state:{fips}"

params:
  get: "NAME,P1_001N"
  for: "county:*"

fields:
  - source: NAME
    alias: name
  - source: P1_001N
    alias: population
    cast: int
  - source: county
    alias: county_fips
  - source: state
    alias: state_fips
  - computed: "{state_fips}{county_fips}"
    alias: full_fips
