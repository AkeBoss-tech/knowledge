name: fred_unemployment
type: api
url: https://api.stlouisfed.org/fred/series/observations

# Iterate over all states (census_states must include 'abbr' from add_state_abbreviations transform)
foreach:
  source: census_states
  field: abbr
  inject_param: series_id
  inject_template: "{abbr}URN"
  inject_fields: [abbr, fips]   # carry abbr + fips into each chunk's rows

params:
  api_key: ${FRED_API_KEY}
  file_type: json
  observation_start: "2010-01-01"
response_format: json
response_path: observations
cache: true
drop_na: true

fields:
  - source: date
    alias: date
  - source: value
    alias: value
    cast: float
  - source: abbr
    alias: abbr
  - source: fips
    alias: fips
