name: fred_income
type: api
url: https://api.stlouisfed.org/fred/series/observations

foreach:
  source: census_states
  field: abbr
  inject_param: series_id
  inject_template: "MEHOINUS{abbr}A646N"
  inject_fields: [abbr, fips]

params:
  api_key: REMOVED_FRED_API_KEY
  file_type: json
  observation_start: "1984-01-01"
response_format: json
response_path: observations
cache: true
drop_na: true

fields:
  - source: date
    alias: date
  - source: value
    alias: value
    cast: float
  - source: abbr
    alias: abbr
  - source: fips
    alias: fips
