ontology: configs/ontology/core.yaml

output_owl: ontology/populated_ontology.owl
db: ontology/onto.db

steps:
  - name: load_states
    api: census_states
    class: State
    uri: "State_{fips}"
    properties:
      hasName: "{name}"
      hasFIPS: "{fips}"
      hasPopulation: "{population}"

  - name: load_counties
    api: census_counties
    # Strip ", New Jersey" / ", New York" suffix from Census county names
    transform: "census_clean::strip_state_suffix"
    class: County
    uri: "County_{full_fips}"
    properties:
      hasName: "{name}"
      hasFIPS: "{full_fips}"
      hasPopulation: "{population}"
    relationships:
      - property: isPartOf
        target_class: State
        target_uri: "State_{state_fips}"

  - name: load_individuals
    api: sample_individuals
    class: Individual
    uri: "{id}"
    properties:
      hasName: "{name}"
      hasIncome: "{income}"
    relationships:
      - property: locatedIn
        target_class: Municipality
        target_uri: "Municipality_{municipality}"
        create_if_missing: true
        create_with_properties:
          hasName: "{municipality}"

  - name: link_municipalities_to_counties
    api: municipality_map
    class: Municipality
    uri: "Municipality_{municipality}"
    relationships:
      - property: isPartOf
        target_class: County
        target_uri: "County_{county_fips}"

  - name: load_nj_unemployment
    api: fred_nj_unemployment
    class: Measure
    uri: "Measure_NJURN_{date}"
    properties:
      hasValue: "{value}"
      hasDate: "{date}"
      hasSeries: "NJURN"
      hasUnit: "Percent"
    relationships:
      - property: measuredFor
        target_class: State
        target_uri: "State_34"

  - name: load_nj_housing
    api: fred_nj_housing
    class: Measure
    uri: "Measure_NJSTHPI_{date}"
    properties:
      hasValue: "{value}"
      hasDate: "{date}"
      hasSeries: "NJSTHPI"
      hasUnit: "Index 1980Q1=100"
    relationships:
      - property: measuredFor
        target_class: State
        target_uri: "State_34"

  - name: load_nj_income
    api: fred_nj_income
    class: Measure
    uri: "Measure_MEHOINUSNJA646N_{date}"
    properties:
      hasValue: "{value}"
      hasDate: "{date}"
      hasSeries: "MEHOINUSNJA646N"
      hasUnit: "Dollars"
    relationships:
      - property: measuredFor
        target_class: State
        target_uri: "State_34"
