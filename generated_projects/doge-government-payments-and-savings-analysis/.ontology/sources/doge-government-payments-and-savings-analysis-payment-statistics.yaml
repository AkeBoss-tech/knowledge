name: doge-government-payments-and-savings-analysis-payment-statistics
type: api
url: https://api.doge.gov/payments/statistics
response_format: json
description: |
  DOGE aggregated payment statistics by agency, request date, and organization.
  Readiness: draft_for_review
fields:
  - source: agency_name
    alias: agency_name
  - source: count
    alias: count
  - source: date
    alias: date
  - source: org_name
    alias: org_name
