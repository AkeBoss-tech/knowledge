name: doge-government-payments-and-savings-analysis-payments
type: api
url: https://api.doge.gov/payments
response_format: json
description: |
  DOGE payment line items with recipient and agency justifications.
  Readiness: draft_for_review
fields:
  - source: payment_date
    alias: payment_date
  - source: payment_amt
    alias: payment_amt
  - source: agency_name
    alias: agency_name
  - source: award_description
    alias: award_description
  - source: fain
    alias: fain
  - source: recipient_justification
    alias: recipient_justification
  - source: agency_lead_justification
    alias: agency_lead_justification
  - source: org_name
    alias: org_name
  - source: generated_unique_award_id
    alias: generated_unique_award_id
