id: dependency_review
description: Review dependency manifests, ownership, and recent changes for software
  risk and maintenance gaps.
schedule: ''
steps:
- id: repo_dependencies
  kind: command
  run: krail --local repo dependencies sources/sample-service
- id: repo_owners
  kind: command
  run: krail --local repo owners sources/sample-service
- id: repo_changed
  kind: command
  run: krail --local repo changed sources/sample-service
- id: repo_symbols
  kind: command
  run: krail --local repo symbols sources/sample-service
- id: dependency_audit
  kind: agent
  role: doctor
  runner: auto
  prompt: Audit dependency manifests, ownership coverage, and recent changes. Record
    notable risks, stale dependencies, missing ownership, and follow-up tasks under
    software topics or research_plan/ as appropriate.
