name: KRAIL Issue Intake

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  intake:
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.body, '/krail')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/krail'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install KRAIL
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/rail-py

      - name: Run issue intake
        env:
          KRAIL_PROJECT_PATH: ${{ vars.KRAIL_PROJECT_PATH }}
        run: |
          PROJECT_ARGS=()
          if [ -n "${KRAIL_PROJECT_PATH:-}" ]; then
            PROJECT_ARGS=(--project "$KRAIL_PROJECT_PATH")
          fi
          python scripts/krail_issue_intake.py \
            --event "$GITHUB_EVENT_PATH" \
            "${PROJECT_ARGS[@]}" \
            --response "$RUNNER_TEMP/krail-response.md" \
            --json-output "$RUNNER_TEMP/krail-result.json"

      - name: Commit generated KRAIL records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t krail_files < <(find . \( -path '*/research_plan/tasks/*.json' -o -path '*/research_plan/work_orders/*.json' \) -print)
          if [ "${#krail_files[@]}" -gt 0 ]; then
            git add "${krail_files[@]}"
          fi
          if git diff --cached --quiet; then
            echo "No KRAIL records to commit."
          else
            git commit -m "chore: record KRAIL issue intake task"
            git push
          fi

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync(process.env.RUNNER_TEMP + "/krail-response.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
