name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, without v prefix"
        required: true
        default: "0.1.0-local-preview"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test local-preview lane
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/rail-py -e packages/mcp-server
          pip install pytest
          PYTHONPATH=packages/rail-py:packages/mcp-server pytest -q \
            packages/rail-py/tests/test_bootstrap.py \
            packages/rail-py/tests/test_markdown_graph.py \
            packages/rail-py/tests/test_cli.py \
            packages/mcp-server/tests/test_server.py::test_mcp_graph_entities_calls_project \
            packages/mcp-server/tests/test_server.py::test_mcp_vector_search_calls_project

      - name: Build Python wheels
        run: |
          pip install build
          mkdir -p dist/wheels
          python -m build packages/rail-py -o dist/wheels
          python -m build packages/mcp-server -o dist/wheels

      - name: Write release notes
        run: |
          mkdir -p dist/release
          cp CHANGELOG.md RELEASE.md dist/release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: KRAIL ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: |
            dist/release/*
            dist/wheels/*
